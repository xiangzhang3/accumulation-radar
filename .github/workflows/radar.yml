name: Accumulation Radar

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 2 * * *" ]; then
            echo "mode=pool" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 * * * *" ]; then
            echo "mode=oi" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
          fi

      - name: Run radar
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python accumulation_radar.py ${{ steps.mode.outputs.mode }}

      - name: Persist database
        run: |
          if [ -f accumulation.db ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f accumulation.db
            git diff --staged --quiet || git commit -m "chore: update radar db [skip ci]"
            git push
          fi
